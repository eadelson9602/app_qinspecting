plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    id 'com.google.firebase.crashlytics'
    // END: FlutterFire Configuration
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

// Versión: 1) Flutter plugin (pubspec), 2) local.properties, 3) leer pubspec.yaml
def localPropertiesFile = rootProject.file("local.properties")
def localProperties = new Properties()
if (localPropertiesFile.exists()) {
    localProperties.load(new FileInputStream(localPropertiesFile))
}
def pubspecFile = rootProject.file("../pubspec.yaml")
def versionCodeFallback = localProperties.getProperty("flutter.versionCode", "1").toInteger()
def versionNameFallback = localProperties.getProperty("flutter.versionName", "1.0.0")
if (pubspecFile.exists()) {
    def pubspec = pubspecFile.text
    def versionMatch = (pubspec =~ /^version:\s*([^\s]+)/).find()
    if (versionMatch) {
        def v = versionMatch[1].toString().split("\\+")
        if (v.length >= 2) {
            versionNameFallback = v[0]
            versionCodeFallback = v[1].toInteger()
        }
    }
}
def versionCodeFinal = versionCodeFallback
def versionNameFinal = versionNameFallback
try {
    if (flutter.versionCode != null) versionCodeFinal = flutter.versionCode
    if (flutter.versionName != null) versionNameFinal = flutter.versionName
} catch (ignored) {}

android {
    namespace = "com.qinspecting.mobile"
    compileSdk = 36
    ndkVersion = flutter.ndkVersion
    
    // Configuración específica para Java 17
    tasks.withType(JavaCompile) {
        options.compilerArgs += ['--release', '17', '-Xlint:-options']
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.qinspecting.mobile"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review/gradle-config.
        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = versionCodeFinal
        versionName = versionNameFinal
    }

    signingConfigs {
        release {
            if (keystoreProperties['storeFile']) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            // Desactivado: R8 con Kotlin 2.1.0 falla en CI (metadata 2.1.0 no soportada).
            // Reactivar cuando AGP/R8 en Codemagic soporte kotlinx-metadata-jvm 2.1.0.
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation "androidx.activity:activity-ktx:1.9.3"
    implementation "androidx.core:core-ktx:1.15.0"
    implementation "androidx.browser:browser:1.8.0"
    implementation "com.google.android.material:material:1.12.0"
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
}

configurations.all {
    resolutionStrategy.eachDependency { details ->
        if (details.requested.group == "androidx.activity" &&
                (details.requested.name == "activity" || details.requested.name == "activity-ktx")) {
            details.useVersion("1.9.3")
        }
        if (details.requested.group == "androidx.core" &&
                (details.requested.name == "core" || details.requested.name == "core-ktx")) {
            details.useVersion("1.15.0")
        }
        if (details.requested.group == "androidx.browser" && details.requested.name == "browser") {
            details.useVersion("1.8.0")
        }
    }
}
